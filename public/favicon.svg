<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
      .favicon-text {
        font-family: 'Oswald', sans-serif;
        font-weight: 700;
        font-size: 18px;
        fill: white;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>
  
  <!-- Fundo gradiente com as cores do projeto -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9cbe31;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a9626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fundo com bordas arredondadas -->
  <rect width="32" height="32" rx="6" ry="6" fill="url(#bgGradient)"/>
  
  <!-- Texto WM -->
  <text x="16" y="16" class="favicon-text">WM</text>
</svg>
